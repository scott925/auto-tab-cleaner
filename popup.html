<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 260px;
      padding: 16px;
      font-family: system-ui, sans-serif;
      margin: 0;
    }
    .setting {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .setting-label { flex: 1; }
    .setting-label span {
      display: block;
      font-size: 13px;
      color: #333;
    }
    .setting-label small {
      display: block;
      font-size: 11px;
      color: #999;
      margin-top: 1px;
    }
    .setting input[type="number"] {
      width: 52px;
      padding: 4px 6px;
      font-size: 13px;
      border: 1px solid #ccc;
      border-radius: 4px;
      text-align: center;
    }
    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
    }
    .toggle input { display: none; }
    .toggle-slider {
      position: absolute;
      inset: 0;
      background: #ccc;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      left: 3px;
      top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle input:checked + .toggle-slider { background: #43a047; }
    .toggle input:checked + .toggle-slider::before { transform: translateX(16px); }
    .section-title {
      font-size: 12px;
      font-weight: 600;
      color: #555;
      margin-bottom: 6px;
    }
    .whitelist-input-row {
      display: flex;
      gap: 6px;
      margin-bottom: 8px;
    }
    .whitelist-input-row input {
      flex: 1;
      padding: 5px 7px;
      font-size: 12px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    .whitelist-input-row button {
      padding: 5px 10px;
      font-size: 12px;
      cursor: pointer;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #f5f5f5;
      white-space: nowrap;
    }
    .whitelist-input-row button:hover { background: #e8e8e8; }
    #whitelist-items {
      margin-bottom: 12px;
      max-height: 120px;
      overflow-y: auto;
    }
    .whitelist-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 6px;
      font-size: 12px;
      border-radius: 4px;
    }
    .whitelist-item:hover { background: #f5f5f5; }
    .whitelist-item .domain { color: #333; }
    .whitelist-item .remove {
      cursor: pointer;
      color: #999;
      font-size: 14px;
      line-height: 1;
      padding: 0 2px;
      border: none;
      background: none;
    }
    .whitelist-item .remove:hover { color: #e00; }
    .divider {
      border: none;
      border-top: 1px solid #eee;
      margin: 12px 0;
    }
    button.full {
      width: 100%;
      padding: 9px;
      font-size: 13px;
      cursor: pointer;
      border: 1px solid #ccc;
      border-radius: 6px;
      background: #f5f5f5;
    }
    button.full:hover { background: #e8e8e8; }
    #status {
      margin-top: 8px;
      font-size: 12px;
      color: #666;
      text-align: center;
      min-height: 16px;
    }
  </style>
</head>
<body>
  <div class="setting">
    <div class="setting-label">
      <span>Auto close</span>
      <small>Automatically close oldest tabs when over limit</small>
    </div>
    <label class="toggle">
      <input type="checkbox" id="autoClose" checked>
      <span class="toggle-slider"></span>
    </label>
  </div>
  <div class="setting">
    <div class="setting-label">
      <span>Max tabs</span>
      <small>Close oldest tabs when count exceeds this</small>
    </div>
    <input id="maxTabs" type="number" min="1" max="200" value="20">
  </div>

  <div class="section-title">Whitelist</div>
  <div style="font-size:11px;color:#999;margin-bottom:6px;">Tabs on these domains will never be auto-closed</div>
  <div class="whitelist-input-row">
    <input id="domainInput" type="text" placeholder="e.g. notion.so">
    <button id="addCurrent">+ Current</button>
    <button id="addDomain">Add</button>
  </div>
  <div id="whitelist-items"></div>

  <hr class="divider">
  <button class="full" id="restore">Restore Last Closed</button>
  <div style="font-size:11px;color:#999;text-align:center;margin-top:4px;">Reopen the last batch of auto-closed tabs</div>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
